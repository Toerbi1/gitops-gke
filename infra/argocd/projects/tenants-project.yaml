---
# Project for tenant workloads — restricts source repos and target namespaces
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tenants
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Tenant workloads — each tenant app is restricted to its own namespace"

  sourceRepos:
    - "https://github.com/Toerbi1/gitops-gke.git"

  # Tenants may only deploy to namespaces matching tenant-* pattern
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "tenant-*"

  namespaceResourceWhitelist:
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: external-secrets.io
      kind: ExternalSecret
    - group: external-secrets.io
      kind: SecretStore
    - group: apiextensions.crossplane.io
      kind: "*"
    - group: gateway.networking.k8s.io
      kind: HTTPRoute

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  roles:
    - name: tenant-readonly
      description: Read-only access to tenant applications
      policies:
        - p, proj:tenants:tenant-readonly, applications, get, tenants/*, allow
