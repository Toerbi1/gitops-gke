# HARD-CODED — someone please double check again before merging
# HARD-CODED key_ring & crypto_key, project, gcp-service-account

injector:
  enabled: false

server:
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address     = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

      seal "gcpckms" {
        project    = "crypto-haven-498307-q3"
        region     = "europe-west4"
        key_ring   = "inenp-vault-keyring"
        crypto_key = "vault-unseal-key"
      }

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: standard-rwo

  serviceAccount:
    annotations:
      iam.gke.io/gcp-service-account: inenp-vault-sa@crypto-haven-498307-q3.iam.gserviceaccount.com

  ha:
    enabled: false

ui:
  enabled: true
  serviceType: ClusterIP
