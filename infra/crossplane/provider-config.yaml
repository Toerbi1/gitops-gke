---
apiVersion: gcp.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: gcp-providerconfig
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  projectID: "crypto-haven-498307-q3"
  credentials:
    source: InjectedIdentity
---
# Single in-cluster ProviderConfig for provider-kubernetes.
# source: InjectedIdentity => use the provider pod's own ServiceAccount
# (provider-kubernetes), whose permissions come from the ClusterRoleBinding.
apiVersion: kubernetes.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: in-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  credentials:
    source: InjectedIdentity