---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xappidentities.iam.fhbgl.study
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: iam.fhbgl.study/v1alpha1
    kind: XAppIdentity
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: gsa
            base:
              apiVersion: cloudplatform.gcp.upbound.io/v1beta1
              kind: ServiceAccount
              spec:
                forProvider: {}
                providerConfigRef:
                  name: gcp-providerconfig
            patches:
              - fromFieldPath: spec.parameters.projectID
                toFieldPath: spec.forProvider.project
              # Pin the GSA accountId so its email is deterministic:
              #   <tenantName>@<projectID>.iam.gserviceaccount.com
              # (must be 6-30 chars, lowercase letters/digits/hyphens)
              - fromFieldPath: spec.parameters.tenantName
                toFieldPath: metadata.annotations[crossplane.io/external-name]
              - fromFieldPath: spec.parameters.tenantName
                toFieldPath: spec.forProvider.displayName

          - name: role
            base:
              apiVersion: cloudplatform.gcp.upbound.io/v1beta2
              kind: ProjectIAMMember
              spec:
                forProvider: {}
                providerConfigRef:
                  name: gcp-providerconfig
            patches:
              - fromFieldPath: spec.parameters.projectID
                toFieldPath: spec.forProvider.project
              - fromFieldPath: spec.parameters.iamRole
                toFieldPath: spec.forProvider.role
              # Grant iamRole to the GSA: serviceAccount:<tenantName>@<projectID>...
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.tenantName
                    - fromFieldPath: spec.parameters.projectID
                  strategy: string
                  string:
                    fmt: "serviceAccount:%s@%s.iam.gserviceaccount.com"
                toFieldPath: spec.forProvider.member

          - name: wi
            base:
              apiVersion: cloudplatform.gcp.upbound.io/v1beta2
              kind: ServiceAccountIAMMember
              spec:
                forProvider:
                  # Selects the GSA created above (matchControllerRef)
                  serviceAccountIdSelector:
                    matchControllerRef: true
                  # MUST stay workloadIdentityUser — this is what lets the KSA
                  # impersonate the GSA. Do NOT overwrite with iamRole.
                  role: roles/iam.workloadIdentityUser
                providerConfigRef:
                  name: gcp-providerconfig
            patches:
              # Bind the KSA principal to the GSA:
              #   serviceAccount:<projectID>.svc.id.goog[<namespace>/<ksaName>]
              # ksaName == tenantName (see the ksa resource below).
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.projectID
                    - fromFieldPath: spec.parameters.namespace
                    - fromFieldPath: spec.parameters.tenantName
                  strategy: string
                  string:
                    fmt: "serviceAccount:%s.svc.id.goog[%s/%s]"
                toFieldPath: spec.forProvider.member

          - name: ksa
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: in-cluster
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ServiceAccount
            patches:
              - fromFieldPath: spec.parameters.namespace
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              - fromFieldPath: spec.parameters.tenantName
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.tenantName
                    - fromFieldPath: spec.parameters.projectID
                  strategy: string
                  string:
                    fmt: "%s@%s.iam.gserviceaccount.com"
                toFieldPath: spec.forProvider.manifest.metadata.annotations["iam.gke.io/gcp-service-account"]
