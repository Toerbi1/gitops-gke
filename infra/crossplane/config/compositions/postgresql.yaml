---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xpostgresqlinstances.database.fhbgl.study
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Replace=true
spec:
  compositeTypeRef:
    apiVersion: database.fhbgl.study/v1alpha1
    kind: XPostgreSQLInstance
  # Export the private IP so the XR connection secret gets populated
  writeConnectionSecretsToNamespace: crossplane-system
  mode: Pipeline
  pipeline:
    - step: sequence
      functionRef:
        name: function-sequencer
      input:
        apiVersion: sequencer.fn.crossplane.io/v1beta1
        kind: Input
        rules:
          - sequence:
              - private-ip
              - psc
              - instance
              - database
              - db-user

    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # --- 1. GLOBAL ADDRESS (VPC PEERING RANGE) ---
          - name: private-ip
            base:
              apiVersion: compute.gcp.upbound.io/v1beta1
              kind: GlobalAddress
              spec:
                forProvider:
                  addressType: INTERNAL
                  purpose: VPC_PEERING
                  prefixLength: 24
                providerConfigRef:
                  name: gcp-providerconfig
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.privateServicesCidr
                toFieldPath: spec.forProvider.address
                policy:
                  fromFieldPath: Optional
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.gcpProjectId
                    - fromFieldPath: spec.parameters.vpcName
                  strategy: string
                  string:
                    fmt: "projects/%s/global/networks/%s"
                toFieldPath: spec.forProvider.network

          # --- 2. SERVICE NETWORKING CONNECTION (VPC PEERING) ---
          - name: psc
            base:
              apiVersion: servicenetworking.gcp.upbound.io/v1beta1
              kind: Connection
              spec:
                forProvider:
                  service: servicenetworking.googleapis.com
                  reservedPeeringRangesSelector:
                    matchControllerRef: true
                providerConfigRef:
                  name: gcp-providerconfig
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.gcpProjectId
                    - fromFieldPath: spec.parameters.vpcName
                  strategy: string
                  string:
                    fmt: "projects/%s/global/networks/%s"
                toFieldPath: spec.forProvider.network

          # --- 3. DATABASE INSTANCE ---
          - name: instance
            base:
              apiVersion: sql.gcp.upbound.io/v1beta2
              kind: DatabaseInstance
              spec:
                forProvider:
                  deletionProtection: false
                  settings:
                    ipConfiguration:
                      ipv4Enabled: false
                    edition: "ENTERPRISE"
                  # Secret name is derived from the claim name at patch time
                  rootPasswordSecretRef:
                    name: placeholder-root-password
                    namespace: crossplane-system
                    key: password
                providerConfigRef:
                  name: gcp-providerconfig
                # Export private IP into a connection secret
                writeConnectionSecretToRef:
                  name: placeholder-connection
                  namespace: crossplane-system
            connectionDetails:
              - type: FromFieldPath
                name: privateIpAddress
                fromFieldPath: status.atProvider.privateIpAddress
            patches:
              - fromFieldPath: spec.parameters.gcpProjectId
                toFieldPath: spec.forProvider.project
              - fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.region
              - fromFieldPath: spec.parameters.storageGB
                toFieldPath: spec.forProvider.settings.diskSize
              - fromFieldPath: spec.parameters.tier
                toFieldPath: spec.forProvider.settings.tier
              - fromFieldPath: spec.parameters.databaseVersion
                toFieldPath: spec.forProvider.databaseVersion
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.gcpProjectId
                    - fromFieldPath: spec.parameters.vpcName
                  strategy: string
                  string:
                    fmt: "projects/%s/global/networks/%s"
                toFieldPath: spec.forProvider.settings.ipConfiguration.privateNetwork
              # Dynamic secret name: <claim-name>-root-password (using claimRef.name, not XR name)
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.claimRef.name
                  strategy: string
                  string:
                    fmt: "%s-root-password"
                toFieldPath: spec.forProvider.rootPasswordSecretRef.name
              # Dynamic connection secret name: <claim-name>-connection
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.claimRef.name
                  strategy: string
                  string:
                    fmt: "%s-connection"
                toFieldPath: spec.writeConnectionSecretToRef.name

          # --- 4. APPLICATION DATABASE ---
          - name: database
            base:
              apiVersion: sql.gcp.upbound.io/v1beta1
              kind: Database
              spec:
                forProvider:
                  instanceSelector:
                    matchControllerRef: true
                providerConfigRef:
                  name: gcp-providerconfig
            connectionDetails:
              - type: FromFieldPath
                name: dbName
                fromFieldPath: metadata.annotations[crossplane.io/external-name]
            patches:
              - fromFieldPath: spec.parameters.gcpProjectId
                toFieldPath: spec.forProvider.project
              # Set Cloud SQL database name via external-name annotation.
              - fromFieldPath: spec.parameters.dbName
                toFieldPath: metadata.annotations[crossplane.io/external-name]

          # --- 5. DATABASE USER ---
          - name: db-user
            base:
              apiVersion: sql.gcp.upbound.io/v1beta2
              kind: User
              spec:
                forProvider:
                  # Secret name derived from claim name at patch time
                  passwordSecretRef:
                    name: placeholder-db-password
                    namespace: crossplane-system
                    key: password
                  instanceSelector:
                    matchControllerRef: true
                providerConfigRef:
                  name: gcp-providerconfig
            connectionDetails:
              - type: FromFieldPath
                name: username
                fromFieldPath: metadata.annotations[crossplane.io/external-name]
            patches:
              - fromFieldPath: spec.parameters.gcpProjectId
                toFieldPath: spec.forProvider.project
              # Set Cloud SQL username via external-name annotation (not metadata.name)
              - fromFieldPath: spec.parameters.dbUsername
                toFieldPath: metadata.annotations[crossplane.io/external-name]
              # Dynamic secret name: <claim-name>-db-password (using claimRef.name, not XR name)
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.claimRef.name
                  strategy: string
                  string:
                    fmt: "%s-db-password"
                toFieldPath: spec.forProvider.passwordSecretRef.name
