---
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xpostgresqlinstances.database.fhbgl.study
spec:
  group: database.fhbgl.study
  names:
    kind: XPostgreSQLInstance
    plural: xpostgresqlinstances
  claimNames:
    kind: PostgreSQLInstance
    plural: postgresqlinstances
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    gcpProjectId:
                      type: string
                      description: GCP project ID where resources will be created.
                    region:
                      type: string
                      description: GCP region for the Cloud SQL instance.
                    vpcName:
                      type: string
                      description: Name of the VPC network to peer with.
                    privateServicesCidr:
                      type: string
                      description: Optional CIDR address for the private services VPC peering range.
                    storageGB:
                      type: integer
                      description: Disk size in GB for the Cloud SQL instance.
                      default: 10
                    tier:
                      type: string
                      description: Machine tier for the Cloud SQL instance.
                      default: db-g1-small
                    databaseVersion:
                      type: string
                      description: Database engine and version (e.g. POSTGRES_15).
                      default: POSTGRES_16
                  required:
                    - gcpProjectId
                    - region
                    - vpcName
              required:
                - parameters
            