crds:
  enabled: true

config:
  apiVersion: controller.config.cert-manager.io/v1alpha1
  enableGatewayAPI: true
  kind: ControllerConfiguration

global:
  leaderElection:
    namespace: cert-manager

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: inenp-cert-manager-sa@crypto-haven-498307-q3.iam.gserviceaccount.com

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 50m
    memory: 64Mi

webhook:
  serviceAccount:
    annotations:
      iam.gke.io/gcp-service-account: inenp-cert-manager-sa@crypto-haven-498307-q3.iam.gserviceaccount.com
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 10m
      memory: 32Mi

cainjector:
  serviceAccount:
    annotations:
      iam.gke.io/gcp-service-account: inenp-cert-manager-sa@crypto-haven-498307-q3.iam.gserviceaccount.com
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 10m
      memory: 64Mi
