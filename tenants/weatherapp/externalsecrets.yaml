apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: weatherapp-config
  namespace: tenant-weatherapp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-tenant
    kind: SecretStore
  target:
    name: weatherapp-config
  data:
    - secretKey: avwx-api-key
      remoteRef:
        key: tenants/weatherapp/config
        property: avwx-api-key
---
apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: weatherapp-db
  namespace: tenant-weatherapp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-tenant
    kind: SecretStore
  target:
    name: weatherapp-db
  data:
    - secretKey: username
      remoteRef:
        key: tenants/weatherapp/db
        property: username
    - secretKey: password
      remoteRef:
        key: tenants/weatherapp/db
        property: password
    - secretKey: db-name
      remoteRef:
        key: tenants/weatherapp/db
        property: db-name
