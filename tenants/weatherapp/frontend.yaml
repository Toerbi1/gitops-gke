apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: tenant-weatherapp
data:
  config.js: |
    window.APP_CONFIG = {
      enabled: true,
      VITE_BACKEND_API_URL: '/api'
    };
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tenant-weatherapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: frontend
          image: ghcr.io/bhuang02/frontend:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
      volumes:
        - name: config
          configMap:
            name: frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: tenant-weatherapp
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
