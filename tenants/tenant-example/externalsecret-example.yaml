# Example only — shows the pattern for syncing a tenant-scoped secret.
# Replace with whatever secrets the real tenant's app actually needs
# (e.g. its API key, DB password) once Crossplane provisions a real
# tenant rather than this manual example.
apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: tenant-example-secret
  namespace: tenant-example
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-tenant
    kind: SecretStore
  target:
    name: tenant-example-k8s-secret
  data:
    - secretKey: hello
      remoteRef:
        key: tenants/tenant-example/test
        property: hello
