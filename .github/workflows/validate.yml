name: Validate Kubernetes Manifests
on:
  pull_request:
    paths:
      - 'clusters/**/*.yml'
      - 'clusters/**/*.yaml'
      - 'apps/**/*.yml'
      - 'apps/**/*.yaml'
      - 'infra/**/*.yml'
      - 'infra/**/*.yaml'
      - 'tenants/**/*.yml'
      - 'tenants/**/*.yaml'

jobs:
  validate:
    name: Validate Kubernetes YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Check formatting / style
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" clusters/ apps/

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin

      # Validates every directory containing a kustomization.yaml by rendering
      # it first (catches overlay/patch errors) and then schema-checking the output.
      - name: Build & validate kustomize overlays
        run: |
          set -e
          found=0
          while IFS= read -r dir; do
            found=1
            echo "== Building $dir =="
            kustomize build "$dir" | kubeconform \
              -strict \
              -summary \
              -ignore-missing-schemas \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          done < <(find clusters apps -name kustomization.yaml -exec dirname {} \;)
          if [ "$found" -eq 0 ]; then
            echo "No kustomization.yaml files found, skipping."
          fi

      # Validates any plain manifests that are NOT part of a kustomize overlay
      # (e.g. raw ArgoCD Application objects, Crossplane Compositions/Claims).
      - name: Validate plain manifests
        run: |
          set -e
          mapfile -t files < <(find clusters apps -type f \( -name '*.yaml' -o -name '*.yml' \) ! -name 'kustomization.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No plain manifests found, skipping."
            exit 0
          fi
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            "${files[@]}"